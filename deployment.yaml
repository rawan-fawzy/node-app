apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
  containers:
  - name: node-app
    image: rawan_fawzy/node-app:latest  # تأكدي من تحديث الصورة إلى أحدث إصدار
    ports:
    - containerPort: 3000